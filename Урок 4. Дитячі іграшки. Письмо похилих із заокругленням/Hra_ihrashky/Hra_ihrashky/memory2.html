<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Гра на відповідність</title>
  <style>
    :root{
      --bg:#f7f1e6;         /* ✅ світло-кремовий фон */
      --shirt:#7ec6ff;      /* ✅ блакитні “сорочки” карток */
      --line:#2a2a2a;
      --good:#1fa84a;
    }
    *{box-sizing:border-box}
    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      text-align: center;
      margin: 0;
      padding: 36px 12px 50px;
      color:#1f1f1f;
    }
    h2{ margin:0 0 18px; font-size:30px; }

    .game-board {
      display: grid;
      grid-template-columns: repeat(5, 110px); /* ✅ 10 пар = 20 карток -> 5×4 */
      gap: 12px;
      justify-content: center;
      margin: 0 auto 26px;
      max-width: 700px;
    }

    .card {
      width: 110px;
      height: 110px;
      position: relative;
      cursor: pointer;
      perspective: 1000px;
      user-select:none;
    }
    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border: 2px solid rgba(0,0,0,.15);
      border-radius: 12px;
      overflow:hidden;
    }
    .card-front {
      background-color: var(--shirt); /* ✅ “сорочка” */
      z-index: 2;
    }
    .card-back {
      transform: rotateY(180deg);
      background-color: #fff;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card-back img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background:#fff;
    }

    /* ✅ збіг: 2 сек світиться зеленим -> потім зникає */
    .matched .card-inner {
      box-shadow: 0 0 12px 6px rgba(31,168,74,.85);
    }
    .hidden {
      animation: fadeOut 0.9s forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; transform: scale(.98); }
    }

    .success-message {
      font-size: 26px;
      color: var(--good);
      display: none;
      margin: 10px 0 14px;
      font-weight: 800;
    }
    .success-message.visible { display: block; }

    .restart-btn {
      padding: 10px 18px;
      font-size: 18px;
      background-color: var(--good);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: none;
      font-weight: 800;
    }
    .restart-btn:hover { filter: brightness(.95); }

    @media (max-width:640px){
      .game-board{ grid-template-columns: repeat(4, 88px); gap:10px; }
      .card{ width:88px; height:88px; }
    }
  </style>
</head>
<body>

  <h2>Знайди пари</h2>
  <div class="game-board" id="gameBoard"></div>

  <div class="success-message" id="successMessage">✅ Це – успіх!</div>
  <button class="restart-btn" id="restartBtn">Зіграти ще!</button>

  <script>
    // ✅ 10 пар (20 карток) — файли img_1.jpg ... img_10.jpg
    const images = Array.from({ length: 10 }, (_, i) => `img_${i + 1}.jpg`);

    let cards = [];
    let flippedCards = [];
    let lockBoard = false;
    let matchedCount = 0;

    const gameBoard = document.getElementById('gameBoard');
    const successMessage = document.getElementById('successMessage');
    const restartBtn = document.getElementById('restartBtn');

    function createCards() {
      cards = [...images, ...images].sort(() => Math.random() - 0.5);
      gameBoard.innerHTML = '';
      flippedCards = [];
      lockBoard = false;
      matchedCount = 0;
      successMessage.classList.remove('visible');
      restartBtn.style.display = 'none';

      cards.forEach((img) => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.image = img;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front"></div>
            <div class="card-back">
              <img src="${img}" alt="">
            </div>
          </div>
        `;

        card.addEventListener('click', () => handleCardClick(card));
        gameBoard.appendChild(card);
      });
    }

    function handleCardClick(card) {
      if (lockBoard) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;
      if (card.classList.contains('hidden')) return;

      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        lockBoard = true;
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.image === card2.dataset.image;

        if (isMatch) {
          // ✅ спочатку відкрились (вже), потім підсвічування зеленим, потім зникають
          setTimeout(() => {
            card1.classList.add('matched');
            card2.classList.add('matched');
          }, 250);

          setTimeout(() => {
            card1.classList.add('hidden');
            card2.classList.add('hidden');
            flippedCards = [];
            lockBoard = false;
            matchedCount += 2;

            if (matchedCount === cards.length) showSuccess();
          }, 2250); // ~2 секунди “зелене світіння”
        } else {
          setTimeout(() => {
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
            flippedCards = [];
            lockBoard = false;
          }, 950);
        }
      }
    }

    function showSuccess() {
      successMessage.classList.add('visible');
      restartBtn.style.display = 'inline-block';
    }

    restartBtn.addEventListener('click', createCards);
    createCards();
  </script>

<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
