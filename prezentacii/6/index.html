<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Урок 6. Овочі та фрукти</title>
<style>
:root{--bg:#f0f8ff;--card:#fff;--text:#2c3e50;--accent:#ffd84d;--blue:#3498db;--blue2:#2980b9;--shadow:rgba(0,0,0,.15);}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.title{font-size:clamp(16px,2.4vw,24px);font-weight:800;text-align:center;padding:10px 56px 4px;}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 10px;min-height:0;}
.slide-wrap{position:relative;height:100%;width:auto;max-width:100%;aspect-ratio:1.3333;box-shadow:0 8px 24px var(--shadow);border-radius:12px;overflow:hidden;background:#fff;}
.slide-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;opacity:0;transition:opacity .15s;}
.slide-wrap img.active{opacity:1;}
.bar{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px;flex-wrap:wrap;}
button.nav{border:0;background:var(--blue);color:#fff;font-size:clamp(16px,2.1vw,22px);font-weight:800;padding:13px 24px;border-radius:14px;cursor:pointer;box-shadow:0 4px 10px var(--shadow);min-width:130px;}
button.nav:hover{background:var(--blue2);}
button.nav:disabled{opacity:.35;cursor:default;}
.counter{font-size:clamp(15px,2vw,20px);font-weight:800;min-width:72px;text-align:center;}
button.icon{border:0;background:var(--accent);width:54px;height:54px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 10px var(--shadow);}
#btn-fs{position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:#fff;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}
</style>
</head>
<body>
<button id="btn-fs" title="На весь екран" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()">⛶</button>
<div class="title">Урок 6. Овочі та фрукти</div>
<div class="stage">
  <div class="slide-wrap" id="wrap">
    <img src="slides/1.jpg" alt="Слайд 1">
    <img src="slides/2.jpg" alt="Слайд 2" loading="lazy">
    <img src="slides/3.jpg" alt="Слайд 3" loading="lazy">
    <img src="slides/4.jpg" alt="Слайд 4" loading="lazy">
    <img src="slides/5.jpg" alt="Слайд 5" loading="lazy">
    <img src="slides/6.jpg" alt="Слайд 6" loading="lazy">
    <img src="slides/7.jpg" alt="Слайд 7" loading="lazy">
    <img src="slides/8.jpg" alt="Слайд 8" loading="lazy">
    <img src="slides/9.jpg" alt="Слайд 9" loading="lazy">
  </div>
</div>
<div class="bar">
  <button class="nav" id="prev">◀ Назад</button>
  <span class="counter" id="counter">1 / 9</span>
  <button class="nav" id="next">Далі ▶</button>
  
</div>

<script>
const imgs=[...document.querySelectorAll('.slide-wrap img')];
let i=0;const total=imgs.length;
const counter=document.getElementById('counter');
const prev=document.getElementById('prev'),next=document.getElementById('next');
function show(n){i=Math.max(0,Math.min(total-1,n));imgs.forEach((im,k)=>im.classList.toggle('active',k===i));counter.textContent=(i+1)+' / '+total;prev.disabled=(i===0);next.disabled=(i===total-1);}
prev.onclick=()=>show(i-1);next.onclick=()=>show(i+1);
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(i-1);if(e.key==='ArrowRight'||e.key===' ')show(i+1);});
let x0=null;const wrap=document.getElementById('wrap');
wrap.addEventListener('touchstart',e=>x0=e.changedTouches[0].clientX,{passive:true});
wrap.addEventListener('touchend',e=>{if(x0===null)return;const dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>40)show(dx<0?i+1:i-1);x0=null;},{passive:true});

show(0);
</script>
</body>
</html>
