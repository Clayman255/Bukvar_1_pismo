<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Гра на відповідність: Фрукти</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* ЗМІНА: Світло-кремовий фон */
      background-color: #fdf5e6; 
      text-align: center;
      margin-top: 30px;
    }
    h2 { margin-bottom: 20px; }
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      gap: 15px;
      justify-content: center;
      margin-bottom: 30px;
    }
    .card {
      width: 100px;
      height: 100px;
      position: relative;
      cursor: pointer;
      perspective: 1000px;
    }
    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border: 2px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
      background-color: white;
    }
    /* Зелена сорочка карти */
    .card-front {
      background-color: #4CAF50; 
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.2) 10px,
        rgba(255,255,255,0.2) 20px
      );
      z-index: 2;
    }
    .card-back {
      transform: rotateY(180deg);
    }
    .card-back img {
      width: 100%;
      height: 100%;
      object-fit: contain; 
      border-radius: 8px;
      display: block;
    }
    .matched .card-inner {
      box-shadow: 0 0 15px 5px #4CAF50;
    }
    .hidden {
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s 0.5s, opacity 0.5s linear;
    }
    .success-message {
      font-size: 28px;
      color: #2E7D32;
      font-weight: bold;
      display: none;
      margin-bottom: 20px;
      animation: popIn 0.5s;
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .success-message.visible {
      display: block;
    }
    .restart-btn {
      padding: 12px 24px;
      font-size: 18px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      display: none;
      transition: background-color 0.3s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .restart-btn:hover {
      background-color: #388E3C;
    }
  </style>
</head>
<body>

<h2>🍏 Знайди пари фруктів 🍌</h2>
<div class="game-board" id="gameBoard"></div>

<div class="success-message" id="successMessage">🎉 Чудово! Всі пари знайдено!</div>
<button class="restart-btn" id="restartBtn">Зіграти ще раз</button>

<script>
  const imageFiles = [
    'Img_1.png', 
    'Img_2.png', 
    'Img_3.png', 
    'Img_4.png', 
    'Img_5.png', 
    'Img_6.png', 
    'Img_7.png', 
    'Img_8.png'
  ];

  let cards = [];
  let flippedCards = [];
  let lockBoard = false;
  let matchedCount = 0;

  const gameBoard = document.getElementById('gameBoard');
  const successMessage = document.getElementById('successMessage');
  const restartBtn = document.getElementById('restartBtn');

  function createCards() {
    cards = [...imageFiles, ...imageFiles];
    cards.sort(() => 0.5 - Math.random());
    
    gameBoard.innerHTML = '';
    matchedCount = 0;
    successMessage.classList.remove('visible');
    restartBtn.style.display = 'none';

    cards.forEach((imgName) => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.image = imgName;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back">
            <img src="${imgName}" alt="${imgName}" onerror="this.style.display='none'; this.parentElement.innerText='Помилка: ' + '${imgName}'">
          </div>
        </div>
      `;

      card.addEventListener('click', () => handleCardClick(card));
      gameBoard.appendChild(card);
    });
  }

  function handleCardClick(card) {
    if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    card.classList.add('flipped');
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      lockBoard = true;
      const [card1, card2] = flippedCards;
      const isMatch = card1.dataset.image === card2.dataset.image;

      if (isMatch) {
        setTimeout(() => {
          card1.classList.add('matched');
          card2.classList.add('matched');
        }, 300);

        setTimeout(() => {
          card1.classList.add('hidden');
          card2.classList.add('hidden');
          
          flippedCards = [];
          lockBoard = false;
          matchedCount += 2;
          
          if (matchedCount === cards.length) {
            showSuccess();
          }
        }, 1000); 
      } else {
        setTimeout(() => {
          card1.classList.remove('flipped');
          card2.classList.remove('flipped');
          flippedCards = [];
          lockBoard = false;
        }, 1000);
      }
    }
  }

  function showSuccess() {
    successMessage.classList.add('visible');
    restartBtn.style.display = 'inline-block';
  }

  restartBtn.addEventListener('click', createCards);

  createCards();
</script>
<button id="btn-fs" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛶';}})()" title="На весь екран" style="position:fixed;top:12px;right:12px;z-index:9999;background:#2c3e50;color:white;border:none;width:44px;height:44px;border-radius:10px;font-size:1.4rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);">⛶</button>
</body>
</html>
