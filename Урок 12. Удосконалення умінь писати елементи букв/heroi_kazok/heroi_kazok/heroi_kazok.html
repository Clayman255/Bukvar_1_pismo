<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Знайди пару (20 карток)</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /* ПРОСТИЙ СВІТЛО-КРЕМОВИЙ ФОН */
      background-color: #FFF8E7; 
      text-align: center;
      margin-top: 20px;
    }
    h2 {
      color: #5d4037;
      font-size: 2em;
      margin-bottom: 15px;
    }
    .game-board {
      display: grid;
      /* 5 колонок по 110px. Разом 20 карток розмістяться у 4 ряди */
      grid-template-columns: repeat(5, 110px);
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
    }
    .card {
      width: 110px;
      height: 110px;
      position: relative;
      cursor: pointer;
      perspective: 1000px;
    }
    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.16);
    }

    /* --- НОВИЙ ДИЗАЙН СОРОЧКИ КАРТКИ --- */
    .card-front {
      /* Базовий жовтий колір */
      background-color: #FFEB3B;
      /* Візерунок з діагональних жовтих смужок */
      background-image: repeating-linear-gradient(
        45deg,
        #FFEB3B,        /* Світліший жовтий старт */
        #FFEB3B 15px,   /* Світліший жовтий кінець (ширина смуги) */
        #FBC02D 15px,   /* Темніший жовтий старт */
        #FBC02D 30px    /* Темніший жовтий кінець (ширина смуги) */
      );
      z-index: 2;
      /* Світло-жовта рамка */
      border: 3px solid #FFF9C4;
    }
    /* Прибрано іконку, щоб були тільки смужки */
    /* .card-front::after { content: '🦊'; } */

    .card-back {
      transform: rotateY(180deg);
      background-color: white;
      border: 3px solid #FBC02D; /* Рамка відкритої картки теж жовта */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      box-sizing: border-box;
    }
    .card-back img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    /* Ефект співпадіння - золоте світіння */
    .matched .card-inner .card-back {
      box-shadow: 0 0 15px 5px #FFD700;
      border-color: #FFD700;
    }

    .hidden {
      animation: zoomOut 0.8s forwards;
      pointer-events: none;
    }
    @keyframes zoomOut {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }

    .success-message {
      font-size: 28px;
      color: #388e3c;
      font-weight: bold;
      display: none;
      margin-bottom: 20px;
      animation: popIn 0.5s;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-message.visible {
      display: block;
    }

    .restart-btn {
      padding: 12px 24px;
      font-size: 20px;
      background-color: #FBC02D; /* Жовта кнопка */
      color: #5d4037;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: none;
      box-shadow: 0 4px 0 #c49000;
      transition: transform 0.1s;
    }
    .restart-btn:hover {
      background-color: #ffca28;
    }
    .restart-btn:active {
        transform: translateY(4px);
        box-shadow: none;
    }

    /* Адаптивність: 4 колонки для вужчих екранів */
    @media (max-width: 600px) {
      .game-board {
        grid-template-columns: repeat(4, 80px);
        gap: 8px;
      }
      .card {
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
<body>

<h2>Знайди пару. Герої казок</h2>
<div class="game-board" id="gameBoard"></div>

<div class="success-message" id="successMessage">🎉 Ура! Всіх героїв знайдено!</div>
<button class="restart-btn" id="restartBtn">Зіграти ще</button>

<script>
  // НАЛАШТУВАННЯ: 10 пар = 20 карток
  const totalPairs = 10; 
  let cardsData = [];

  function generateCardsData() {
    let temp = [];
    // Цикл від 1 до 10 (Img_1.png ... Img_10.png)
    for (let i = 1; i <= totalPairs; i++) {
      temp.push({ id: i, img: `Img_${i}.png` });
      temp.push({ id: i, img: `Img_${i}.png` });
    }
    return temp;
  }

  let cards = [];
  let flippedCards = [];
  let lockBoard = false;
  let matchedCount = 0;

  const gameBoard = document.getElementById('gameBoard');
  const successMessage = document.getElementById('successMessage');
  const restartBtn = document.getElementById('restartBtn');

  function createCards() {
    cards = generateCardsData();
    cards.sort(() => 0.5 - Math.random());
    
    gameBoard.innerHTML = '';
    matchedCount = 0;
    successMessage.classList.remove('visible');
    restartBtn.style.display = 'none';

    cards.forEach((item) => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.pairId = item.id;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back">
            <img src="${item.img}" alt="Герой">
          </div>
        </div>
      `;

      card.addEventListener('click', () => handleCardClick(card));
      gameBoard.appendChild(card);
    });
  }

  function handleCardClick(card) {
    if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    card.classList.add('flipped');
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      lockBoard = true;
      const [card1, card2] = flippedCards;
      
      const isMatch = card1.dataset.pairId === card2.dataset.pairId;

      if (isMatch) {
        setTimeout(() => {
          card1.classList.add('matched');
          card2.classList.add('matched');
        }, 300);

        setTimeout(() => {
          card1.classList.add('hidden');
          card2.classList.add('hidden');
          
          resetBoard();
          matchedCount += 2;
          
          if (matchedCount === cards.length) {
            showSuccess();
          }
        }, 1500);

      } else {
        setTimeout(() => {
          card1.classList.remove('flipped');
          card2.classList.remove('flipped');
          resetBoard();
        }, 1000);
      }
    }
  }

  function resetBoard() {
    flippedCards = [];
    lockBoard = false;
  }

  function showSuccess() {
    successMessage.classList.add('visible');
    restartBtn.style.display = 'inline-block';
  }

  restartBtn.addEventListener('click', createCards);

  createCards();
</script>

</body>
</html>
